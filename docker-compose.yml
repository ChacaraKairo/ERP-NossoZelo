services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-nossozelo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: erp_nossozelo
      POSTGRES_USER: erp_nossozelo
      POSTGRES_PASSWORD: erp_nossozelo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_nossozelo -d erp_nossozelo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
